# Training config. The base model is CONFIGURABLE here (not hard-coded in code).
# Launch:  python -m machine_learning.cli train run 8b_unified_multitask
# The 8B configs use 4-bit QLoRA and require a CUDA GPU; on CPU the loader
# transparently downgrades to full-precision LoRA (used by the smoke test).
name: 8b_unified_multitask
model:
  base_model: Qwen/Qwen2.5-7B
  revision: main
  tokenizer: Qwen/Qwen2.5-7B
  tokenizer_revision: main
  quantization: 4bit
  dtype: bfloat16
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: null
gradient_checkpointing: true
data:
  view: unified_behavior_multitask_v1
train:
  seed: 42
  batch_size: 1
  grad_accum: 16
  learning_rate: 0.0002
  epochs: 1
  max_seq_len: 2048
  save_steps: 500
  eval_steps: 500
  warmup_steps: 100
  early_stopping_patience: 3
  max_grad_norm: 1.0
