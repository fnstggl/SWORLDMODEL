# =====================================================================================
# Dataset registry. One entry per dataset. Licensing + access verified from OFFICIAL
# sources (HF dataset cards, official GitHub/GitLab repos, official papers, institutional
# pages) on last_verified_at. Where a source declares no license, we say so and keep it
# out of training (license_class: unknown_unstated / research_only).
#
# `dataset_role`      : TRAIN_CANDIDATE | VALIDATION_CANDIDATE | CROSS_DATASET_EVAL_ONLY |
#                       LICENSE_RESTRICTED_EVAL_ONLY | INFRASTRUCTURE_ONLY | ACCESS_BLOCKED | UNUSABLE
# `conversion_status` : PENDING | CONVERTER_READY_STORAGE_BLOCKED | SAMPLE_NORMALIZED |
#                       NORMALIZED_AND_VALIDATED | NORMALIZED_EVAL_ONLY | INFRASTRUCTURE_ONLY |
#                       ACCESS_BLOCKED | LICENSE_BLOCKED | SOURCE_UNAVAILABLE | UNUSABLE_AFTER_INSPECTION
# `acquire.estimated_bytes` = size of the PLANNED pull (a streamed sample, not the full set);
# `full_expected_bytes`     = size of the complete dataset (for the readiness/storage report).
# =====================================================================================

datasets:

# ------------------------------------------------------------------ multi-agent / social
  - dataset_id: debate
    official_name: "DEBATE: A Large-Scale Benchmark for Evaluating Opinion Dynamics in Role-Playing LLM Agents"
    description: "Real US human debates with private 6-point Likert beliefs measured before AND after multi-round discussion, plus public chat messages. 2,788 participants / 697 groups / 107 topics; 5,302 pre/post opinion ratings."
    official_paper: "https://arxiv.org/abs/2510.25110"
    official_data_source: "https://openreview.net/forum?id=rMnZbCOhSS"
    official_code_source: ""
    license: "Not stated (data not yet publicly released)"
    license_class: unknown_unstated
    commercial_use_allowed: unknown
    derivatives_allowed: unknown
    redistribution_allowed: unknown
    personal_data_notes: "Human belief ratings + chat text; participants are real people. Handle as personal data if released."
    access_requirements: "Reviewer-gated at submission; authors state a public release is planned but no stable URL confirmed."
    gated: true
    expected_size: "small (text): ~29-30k utterances, 5,302 pre/post ratings"
    full_expected_bytes: null
    download_method: manual
    checksum_method: sha256
    dataset_role: ACCESS_BLOCKED
    supported_tasks: [PREDICT_NEXT_MESSAGE, PREDICT_NEXT_SPEAKER, PREDICT_BELIEF_CHANGE, PREDICT_TRAJECTORY_CONTINUATION, PREDICT_FINAL_OUTCOME]
    split_unit: participant   # also hold out groups + topics
    conversion_status: ACCESS_BLOCKED
    blockers: "Dataset not publicly released as of last_verified_at. Human action: watch arxiv/OpenReview page rMnZbCOhSS for the promised code+data release, or email the authors (UW-Madison / Google DeepMind / Stanford) for pre-release access."
    last_verified_at: "2026-07-22"
    verification: {confidence: high, note: "Identity high-confidence; public data URL unconfirmed.", sources: ["https://arxiv.org/abs/2510.25110", "https://openreview.net/forum?id=rMnZbCOhSS"]}
    converter: machine_learning.normalization.converters.debate.Converter

